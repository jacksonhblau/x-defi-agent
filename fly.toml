# fly.toml app configuration file generated for x-defi-agent on 2026-05-14T17:33:06-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'x-defi-agent'
primary_region = 'iad'

[build]
  dockerfile = 'apps/workers-py/Dockerfile'

[deploy]
  release_command = 'python -m workers.cli migrate'

[env]
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  TELEGRAM_SESSION_PATH = '/app/data/telegram.session'

[processes]
  watch = 'python -m workers.cli watch --interval 60'

[[mounts]]
  source = 'agent_data'
  destination = '/app/data'
  initial_size = '1gb'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
